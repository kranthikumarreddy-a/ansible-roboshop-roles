- name: Create {{ component }} system user
  ansible.builtin.user:
    name: roboshop
    system: yes
    home: /app
    shell: /sbin/nologin

  
- name: delete app directory
  ansible.builtin.file:
    path: /app
    state: absent    

- name: Create the app directory
  ansible.builtin.file:
    path: /app
    state: directory     

- name: delete {{ component }} zip file
  ansible.builtin.file:
    path: /tmp/{{ component }}.zip
    state: absent     

- name: Download the {{ component }} application
  ansible.builtin.get_url:
    url: https://roboshop-artifacts.s3.amazonaws.com/{{ component }}-v3.zip 
    dest: /tmp/{{ component }}.zip  

- name: unzip the {{ component }} zip file which is located at /tmp/{{ component }}.zip 
  ansible.builtin.unarchive:
    src: /tmp/{{ component }}.zip 
    dest: /app
    remote_src: yes